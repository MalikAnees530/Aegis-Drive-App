# This workflow will greet first-time contributors

name: Greetings

on: [pull_request, issues]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: 'Welcome to Aegis Drive! Thank you for opening your first issue. Our team will review it shortly.'
        pr-message: 'Welcome to Aegis Drive! Thank you for your first pull request. We will review it as soon as possible.'
